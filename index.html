<!DOCTYPE html>
<html lang="en">
  <head>
    <title>zodiac</title>

    <link rel="icon" type="image/png" href="https://www.google.com/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/Darkdragonzxs/sandstone@latest/main.css">

    <style id="customizable-css">
      :root {
        --custom-bg-color: #222222;
        --custom-text-color: #dddddd;
      }

      html {
        background-color: var(--custom-bg-color);
      }

      * {
        color: var(--custom-text-color);
      }

      body.fullscreen-mode #address_bar,
      body.fullscreen-mode #options_div {
        display: none !important;
      }

      body.fullscreen-mode #frame_container {
        height: 100vh;
      }
    </style>
  </head>

  <body>
    <div id="address_bar">
      <div id="favicon_container">
        <p id="favicon_text" style="display: none;">...</p>
        <img id="favicon_img">
      </div>

      <input id="url_box" type="text" placeholder="Enter URL here..." value="sandstone://home">

      <button id="navigate_button">
        <i class="fa-solid fa-paper-plane"></i>
      </button>

      <button id="options_button">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>

    <div id="frame_container"></div>

    <div id="options_div" style="display: none;">
      
      <div style="display: flex; align-items: center;">
        <h2 style="margin: 0;">Options</h2>
        <div style="flex-grow: 1"></div>
        <button id="close_options_button">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div id="wisp_row">
        <span>Wisp URL:</span>
        <input id="wisp_url_input" type="text" placeholder="wss://..." />
      </div>

      <div style="display: flex; gap: 8px; align-items: center;">
        <p>Eval JS</p>
        <div style="flex-grow: 1"></div>
        <button id="eval_js_button">Run</button>
      </div>

      <textarea id="eval_js_input" placeholder="type js here..."></textarea>

      <div style="flex-grow: 1"></div>
    </div>

    <script id="customizable-js">
      window.SANDSTONE_CUSTOM = { homepageTitle: "zodiac" };
      window.SANDSTONE_CUSTOM = window.SANDSTONE_CUSTOM || {};
      window.SANDSTONE_CUSTOM.defaultWispServer = "wss://zodiac.icu/wisp/";

      (function applyQueryUrlModeAndWispConfig() {
        const params = new URLSearchParams(window.location.search);
        const queryUrl = params.get("url");
        const WISP_STORAGE_KEY = "sandstone:wisp-server";
        const defaultWispServer = window.SANDSTONE_CUSTOM.defaultWispServer;

        if (queryUrl) {
          document.body.classList.add("fullscreen-mode");
          window.location.hash = queryUrl;
        }

        const applyWispServer = (serverUrl) => {
          if (!serverUrl) return;
          if (window.sandstone?.network?.set_websocket) {
            window.sandstone.network.set_websocket(serverUrl);
          }
          const wispInput = document.getElementById("wisp_url_input");
          if (wispInput) {
            wispInput.value = serverUrl;
          }
        };

        const persistAndApplyWispServer = (serverUrl) => {
          const trimmed = (serverUrl || "").trim();
          if (!trimmed) return;
          localStorage.setItem(WISP_STORAGE_KEY, trimmed);
          applyWispServer(trimmed);
        };

        const initializeWispServer = () => {
          const saved = localStorage.getItem(WISP_STORAGE_KEY);
          const activeServer = saved || defaultWispServer;
          applyWispServer(activeServer);
        };

        const waitForMainRuntime = setInterval(() => {
          const ready =
            !!window.sandstone?.network?.set_websocket &&
            !!document.getElementById("wisp_url_input");
          if (!ready) return;

          clearInterval(waitForMainRuntime);
          initializeWispServer();

          const wispInput = document.getElementById("wisp_url_input");
          const onUserWispChange = () => persistAndApplyWispServer(wispInput.value);
          wispInput.addEventListener("change", onUserWispChange);
          wispInput.addEventListener("blur", onUserWispChange);
        }, 25);
      })();
    </script>
<script>
  (function () {
    const originalGet = document.getElementById.bind(document);

    document.getElementById = function (id) {
      const el = originalGet(id);

      if (el) return el;

      return {
        textContent: "",
        value: "",
        innerHTML: "",
        style: {},
        addEventListener: () => {},
        removeEventListener: () => {},
        setAttribute: () => {},
        getAttribute: () => null,
        appendChild: () => {},
      };
    };
  })();
</script>

    <script src="https://cdn.jsdelivr.net/gh/Darkdragonzxs/sandstone@latest/main.js"></script>

    <script>
      document.getElementById("wisp_row").addEventListener("click", () => {
        document.getElementById("wisp_url_input").focus();
      });

      document.getElementById("options_div").addEventListener("click", (e) => {
        if (!e.target.closest("button") && !e.target.closest("input")) {
          document.getElementById("eval_js_input").focus();
        }
      });
    </script>
  </body>
</html>
